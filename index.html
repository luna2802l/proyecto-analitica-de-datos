<!DOCTYPE Github Pages html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasificador Iris UCI</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f6fb;margin:0;padding:20px}.container{max-width:850px;margin:auto;background:white;padding:25px;border-radius:16px;box-shadow:0 6px 18px #0002}h1{color:#243b6b}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}label{font-weight:bold;font-size:14px}input{width:100%;padding:9px;margin-top:4px;border:1px solid #bbb;border-radius:8px}button{margin-top:20px;padding:12px 18px;border:0;border-radius:10px;background:#243b6b;color:white;font-size:16px;cursor:pointer}.resultado{margin-top:20px;padding:18px;border-radius:12px;background:#eef3ff;font-size:20px}.nota{color:#555}
  </style>
</head>
<body>
<div class="container">
  <h1>Clasificador de Flores Iris - UCI</h1>
  <p class="nota">Página web para GitHub Pages. Usa un modelo de clasificación múltiple basado en las medidas de la flor.</p>
  <div id="form" class="grid"></div>
  <button onclick="predecir()">Predecir clase</button>
  <div id="resultado" class="resultado">Ingrese valores y presione predecir.</div>
</div>
<script>
const model={"features":["sepal_length","sepal_width","petal_length","petal_width"],"classes":["Iris-setosa","Iris-versicolor","Iris-virginica"],"mean":[5.84,3.05,3.76,1.2],"scale":[0.82,0.43,1.76,0.76],"coef":[[-1.5,1.3,-2.2,-2.0],[0.5,-1.0,0.6,-0.8],[1.0,-0.3,1.6,2.8]],"intercept":[0.5,1.0,-1.5],"defaults":{"sepal_length":5.8,"sepal_width":3.0,"petal_length":4.35,"petal_width":1.3},"accuracy":0.9667};
const form=document.getElementById('form');
model.features.forEach(f=>{const d=document.createElement('div');d.innerHTML=`<label>${f}</label><input id="${f}" type="number" step="any" value="${model.defaults[f]}">`;form.appendChild(d);});
function softmax(z){const m=Math.max(...z);const e=z.map(v=>Math.exp(v-m));const s=e.reduce((a,b)=>a+b,0);return e.map(v=>v/s)}
function predecir(){const x=model.features.map((f,i)=>(parseFloat(document.getElementById(f).value)-model.mean[i])/model.scale[i]);const scores=model.coef.map((row,k)=>row.reduce((sum,c,i)=>sum+c*x[i],model.intercept[k]));const p=softmax(scores);let idx=p.indexOf(Math.max(...p));document.getElementById('resultado').innerHTML=`Predicción: <b>${model.classes[idx]}</b><br>Probabilidad aproximada: <b>${(p[idx]*100).toFixed(2)}%</b><br>Accuracy del modelo: <b>${(model.accuracy*100).toFixed(2)}%</b>`;}
</script>
</body>
</html>
